name: ci-cd-eb-v2

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  EB_APP: ${{ vars.EB_APP }}
  EB_ENV_PROD: ${{ vars.EB_ENV_PROD }}
  EB_ENV_STAGING: ${{ vars.EB_ENV_STAGING }}
  AWS_REGION: ${{ secrets.AWS_REGION }}

jobs:
  build_test_package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Build and test
        run: mvn -B -ntp clean verify
      - name: Create EB bundle
        run: |
          JAR_FILE=$(ls target/*.jar | head -n1)
          cp "$JAR_FILE" application.jar
          zip -r bundle.zip Procfile application.jar
      - uses: actions/upload-artifact@v4
        with:
          name: eb-bundle
          path: bundle.zip

  deploy_staging:
    needs: build_test_package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: eb-bundle
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Deploy Staging to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v21
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          application_name: ${{ env.EB_APP }}
          environment_name: ${{ env.EB_ENV_STAGING }}
          version_label: staging-${{ github.sha }}
          region: ${{ env.AWS_REGION }}
          deployment_package: bundle.zip
      - name: Health check staging
        run: curl -fsSL "http://catalinstaging.eu-west-3.elasticbeanstalk.com/api/health"

  deploy_prod:
    needs: deploy_staging
    environment: production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: eb-bundle
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Deploy Prod to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v21
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          application_name: ${{ env.EB_APP }}
          environment_name: ${{ env.EB_ENV_PROD }}
          version_label: prod-${{ github.sha }}
          region: ${{ env.AWS_REGION }}
          deployment_package: bundle.zip
      - name: Health check prod
        run: curl -fsSL "http://catalinprod.eu-west-3.elasticbeanstalk.com/api/health"
